services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: "Team Status"
      APP_ENV: production
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "false"
      APP_URL: "${APP_URL:-http://localhost:8000}"
      APP_TIMEZONE: "${APP_TIMEZONE:-Asia/Kolkata}"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: team_status
      DB_USERNAME: team_status_user
      DB_PASSWORD: team_status_password
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      ADMIN_NAME: "${ADMIN_NAME:-Admin}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@example.com}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-password}"
      LOG_CHANNEL: stderr

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: team_status
      MYSQL_USER: team_status_user
      MYSQL_PASSWORD: team_status_password
      MYSQL_ROOT_PASSWORD: root_password_here
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
